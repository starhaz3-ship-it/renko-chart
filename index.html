<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Renko (on-device) · Star + Chandelier + Fib</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#241710">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Renko">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<style>
  :root{--bg:#160d07;--panel:#241710;--bd:#3a2418;--tx:#f3e3d0;--dim:#b08c6e;--gold:#e0b974;--gold2:#c79350;--up:#36d39a;--dn:#ef6b63;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--tx);font:13px/1.4 ui-sans-serif,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  #app{display:flex;flex-direction:column;height:100vh}
  #bar{display:flex;align-items:center;gap:10px;padding:8px 12px;background:linear-gradient(180deg,#33200f,#1c110a);border-bottom:1px solid var(--gold2);box-shadow:0 2px 12px rgba(0,0,0,.5);flex-wrap:wrap}
  #bar .sym{font-weight:800;font-size:16px;color:var(--gold)}
  .badge{padding:2px 9px;border-radius:20px;background:linear-gradient(180deg,#0f9d63,#06633e);border:1px solid #36d39a;color:#eafff4;font-weight:700;font-size:11px}
  #bar .grow{flex:1}
  #toggles{display:flex;gap:10px;align-items:center;color:var(--dim);font-size:12px;flex-wrap:wrap}
  #toggles label{display:flex;gap:4px;align-items:center;cursor:pointer;user-select:none}
  #toggles input{accent-color:var(--gold)}
  #status{font-size:11px;color:var(--dim)}
  #charts{flex:1;display:flex;flex-direction:row;min-height:0}
  #sidebar{flex:0 0 116px;display:flex;flex-direction:column;gap:6px;padding:10px 8px;background:linear-gradient(180deg,#241710,#190f08);border-right:1px solid var(--gold2)}
  .sbtitle{color:var(--gold2);font-size:10px;letter-spacing:1px;margin-bottom:2px}
  .symbtn{text-align:left;padding:9px 10px;border-radius:7px;border:1px solid var(--bd);background:#2c1c12;color:var(--tx);font-size:13px;font-weight:700;cursor:pointer}
  .symbtn:hover{background:#3a2410}
  .symbtn.active{background:linear-gradient(180deg,#e0b974,#c79350);border-color:var(--gold);color:#241710;box-shadow:0 0 12px rgba(224,185,116,.4)}
  .col{flex:1 1 50%;display:flex;flex-direction:column;min-width:0;min-height:0}
  .col+.col{border-left:2px solid #000}
  .colhead{display:flex;align-items:center;gap:8px;padding:6px 11px;background:linear-gradient(180deg,#2c1c12,#1a1009);border-bottom:1px solid var(--bd);font-size:12px;white-space:nowrap;overflow:hidden}
  .colhead .ct{font-weight:800;font-size:13px;color:var(--gold)}
  .colhead .pill{padding:1px 8px;border:1px solid var(--bd);border-radius:5px;color:var(--dim);background:rgba(0,0,0,.2)}
  .panes{flex:1;display:flex;flex-direction:column;min-height:0}
  .pane{position:relative;width:100%}
  .pmain{flex:1 1 58%} .pewo{flex:1 1 21%;border-top:1px solid var(--bd)} .prsi{flex:1 1 21%;border-top:1px solid var(--bd)}
  .tag{position:absolute;top:5px;left:9px;z-index:3;color:var(--gold2);font-size:10px;pointer-events:none;opacity:.8}
  .up{color:var(--up)} .dn{color:var(--dn)}
  .banner{position:absolute;top:26px;left:50%;transform:translateX(-50%);z-index:6;padding:7px 16px;border-radius:11px;font-size:14px;font-weight:800;white-space:nowrap;border:1px solid rgba(255,255,255,.2);display:none}
  .banner.buy{background:linear-gradient(180deg,#0f9d63,#06633e);color:#eafff4;box-shadow:0 0 18px rgba(54,211,154,.5)}
  .banner.sell{background:linear-gradient(180deg,#d23a3a,#8e1422);color:#ffecef;box-shadow:0 0 18px rgba(239,107,99,.5)}
  .banner.flat{background:linear-gradient(180deg,#3a2410,#241710);color:var(--gold);font-weight:700;font-size:12px;border-color:var(--gold2)}
  .sigbubble{position:absolute;z-index:5;transform:translate(-50%,-50%);padding:3px 10px;border-radius:9px;font-size:12px;font-weight:800;white-space:nowrap;pointer-events:none;border:1px solid rgba(255,255,255,.25)}
  .sigbubble.buy{background:linear-gradient(180deg,#3ee9a8,#13b87f);color:#04220f;box-shadow:0 0 12px rgba(54,211,154,.6)}
  .sigbubble.sell{background:linear-gradient(180deg,#ff7a72,#e0413d);color:#2a0309;box-shadow:0 0 12px rgba(239,107,99,.6)}
  .sigbubble:after{content:"";position:absolute;left:50%;margin-left:-6px;border:6px solid transparent}
  .sigbubble.buy:after{top:100%;border-top-color:#13b87f}
  .sigbubble.sell:after{bottom:100%;border-bottom-color:#e0413d}
  .sigbubble.latest{animation:pulse 1.8s infinite}
  @keyframes pulse{0%{filter:brightness(1)}50%{filter:brightness(1.35)}100%{filter:brightness(1)}}
  @media (max-width:820px){
    #charts{flex-direction:column}
    #sidebar{flex:0 0 auto;flex-direction:row;gap:6px;overflow-x:auto;border-right:none;border-bottom:1px solid var(--gold2);padding:7px 8px}
    .sbtitle{display:none} .symbtn{flex:0 0 auto;padding:8px 13px}
    .col+.col{border-left:none;border-top:2px solid #000}
    #bar{gap:7px;padding:6px 8px} .banner{font-size:12px;padding:5px 11px;top:20px} #toggles{gap:8px;font-size:11px}
  }
</style>
</head>
<body>
<div id="app">
  <div id="bar">
    <span class="sym" id="sym">BTC</span>
    <span class="badge">ON-DEVICE</span>
    <span class="grow"></span>
    <div id="toggles">
      <label><input type="checkbox" id="t_qual" checked> Qualified ▲▼</label>
      <label><input type="checkbox" id="t_bubble" checked> Bubbles</label>
      <label class="adxctl">Regime ADX≥ <b id="adxval" style="color:var(--gold)">25</b> <input type="range" id="adx_slider" min="0" max="40" step="1" value="25" style="width:84px;vertical-align:middle"></label>
      <label><input type="checkbox" id="t_chand" checked> Chandelier</label>
      <label><input type="checkbox" id="t_star" checked> Star</label>
      <label><input type="checkbox" id="t_dema"> DEMA14/200✦</label>
      <label><input type="checkbox" id="t_fib" checked> Fib</label>
      <label><input type="checkbox" id="t_lines" checked> Lines</label>
      <label title="ping + sound when a NEW qualified signal fires (app must be open / foreground)"><input type="checkbox" id="t_alerts"> 🔔 Alerts</label>
    </div>
    <span id="status">starting…</span>
  </div>
  <div id="charts">
    <div id="sidebar">
      <div class="sbtitle">SYMBOL</div>
      <button class="symbtn active" data-sym="BTC">₿ BTC</button>
      <button class="symbtn" data-sym="GOLD">🥇 GOLD</button>
      <button class="symbtn" data-sym="SILVER">🥈 SILVER</button>
      <button class="symbtn" data-sym="ETH">Ξ ETH</button>
      <button class="symbtn" data-sym="SOL">◎ SOL</button>
      <button class="symbtn" data-sym="XRP">✕ XRP</button>
      <button class="symbtn" data-sym="DOGE">Ð DOGE</button>
      <button class="symbtn" data-sym="AVAX">🔺 AVAX</button>
    </div>
    <div class="col" id="colL"><div class="colhead" id="headL"></div><div class="panes">
      <div class="pane pmain" id="Lmain"><div class="tag">5m Renko · Star · Chandelier · Fib</div></div>
      <div class="pane pewo" id="Lewo"><div class="tag">EWO</div></div>
      <div class="pane prsi" id="Lrsi"><div class="tag">RSI(14)</div></div></div></div>
    <div class="col" id="colR"><div class="colhead" id="headR"></div><div class="panes">
      <div class="pane pmain" id="Rmain"><div class="tag">1h candles · Star · Chandelier · Fib</div></div>
      <div class="pane pewo" id="Rewo"><div class="tag">EWO</div></div>
      <div class="pane prsi" id="Rrsi"><div class="tag">RSI(14)</div></div></div></div>
  </div>
</div>

<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<script src="renko_compute.js"></script>
<script>
const COL={grid:"#2a1c12",bd:"#43291a",tx:"#f3e3d0",dim:"#b08c6e",gold:"#e0b974",up:"#36d39a",dn:"#ef6b63",mavi:"#5db4ff",kirmizi:"#ff8a5c",ls:"#36d39a",ss:"#ef6b63"};
const FAPI={BTC:'BTCUSDT',GOLD:'PAXGUSDT',SILVER:'XAGUSDT',ETH:'ETHUSDT',SOL:'SOLUSDT',XRP:'XRPUSDT',DOGE:'DOGEUSDT',AVAX:'AVAXUSDT'};
function on(id){return document.getElementById(id).checked;}
function status(m){document.getElementById('status').textContent=m;}
function bgPaint(){const CT=LightweightCharts.ColorType;return (CT&&CT.VerticalGradient)?{type:CT.VerticalGradient,topColor:"#2a1a10",bottomColor:"#120b06"}:{type:"solid",color:"#1a1009"};}
function mkChart(el,withTime){return LightweightCharts.createChart(el,{width:el.clientWidth,height:el.clientHeight,
  layout:{background:bgPaint(),textColor:COL.tx,fontSize:11},grid:{vertLines:{color:COL.grid},horzLines:{color:COL.grid}},
  rightPriceScale:{borderColor:COL.bd,minimumWidth:66},timeScale:{borderColor:COL.bd,timeVisible:true,secondsVisible:false,visible:!!withTime,rightOffset:6},
  crosshair:{mode:LightweightCharts.CrosshairMode.Normal,vertLine:{color:COL.gold,width:1,labelBackgroundColor:"#5a3a1c"},horzLine:{color:COL.gold,width:1,labelBackgroundColor:"#5a3a1c"}}});}

function Column(prefix,headId){
  const mainEl=document.getElementById(prefix+'main'),ewoEl=document.getElementById(prefix+'ewo'),rsiEl=document.getElementById(prefix+'rsi');
  const cMain=mkChart(mainEl,false),cEwo=mkChart(ewoEl,false),cRsi=mkChart(rsiEl,true);
  const sCandle=cMain.addCandlestickSeries({upColor:COL.up,downColor:COL.dn,borderVisible:false,wickUpColor:COL.up,wickDownColor:COL.dn,priceLineVisible:false});
  const sMavi=cMain.addLineSeries({color:COL.mavi,lineWidth:2,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
  const sKir=cMain.addLineSeries({color:COL.kirmizi,lineWidth:2,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
  const sLS=cMain.addLineSeries({color:COL.ls,lineWidth:1,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
  const sSS=cMain.addLineSeries({color:COL.ss,lineWidth:1,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
  const sEwo=cEwo.addHistogramSeries({priceLineVisible:false,lastValueVisible:false});
  const sRsi=cRsi.addLineSeries({color:COL.gold,lineWidth:2,priceLineVisible:false,lastValueVisible:false});
  const banner=document.createElement('div');banner.className='banner';mainEl.appendChild(banner);
  const head=document.getElementById(headId);
  let fibLines=[],rsiBands=[],firstFit=true,QS=[],bub=[],idxByTime={},syncing=false,lastSym=null;
  [cMain,cEwo,cRsi].forEach(src=>src.timeScale().subscribeVisibleLogicalRangeChange(r=>{if(syncing||!r)return;syncing=true;[cMain,cEwo,cRsi].forEach(c=>{if(c!==src)c.timeScale().setVisibleLogicalRange(r);});syncing=false;}));
  cMain.timeScale().subscribeVisibleLogicalRangeChange(()=>pos());
  function ensure(nn){while(bub.length<nn){const b=document.createElement('div');b.className='sigbubble';mainEl.appendChild(b);bub.push(b);}while(bub.length>nn){bub.pop().remove();}}
  function pos(){if(!QS.length||!on('t_bubble')){bub.forEach(b=>b.style.display='none');return;}
    QS.forEach((s,i)=>{const b=bub[i];if(!b)return;const x=cMain.timeScale().timeToCoordinate(s.time),y=sCandle.priceToCoordinate(s.price);
      if(x===null||y===null){b.style.display='none';return;}const buy=s.dir===1,last=(i===QS.length-1);
      b.className='sigbubble '+(buy?'buy':'sell')+(last?' latest':'');b.textContent=(buy?'▲ BUY ':'▼ SELL ')+s.fib;b.style.display='block';b.style.left=x+'px';b.style.top=(y+(buy?-24:24))+'px';});}
  function setBanner(d){if(!on('t_bubble')){banner.style.display='none';return;}
    if(!QS.length){banner.className='banner flat';banner.style.display='block';banner.textContent='No qualified signal · trend '+d.trend;return;}
    const s=QS[QS.length-1],buy=s.dir===1,idx=idxByTime[s.time],ago=(idx===undefined)?'':' · '+Math.max(0,d.bricks.length-1-idx)+' bars ago';
    banner.className='banner '+(buy?'buy':'sell');banner.style.display='block';banner.textContent=(buy?'▲ BUY':'▼ SELL')+'  '+s.price.toLocaleString()+'  · Fib '+s.fib+ago;}
  function render(d){
    if(!d||d.error){head.innerHTML='<span class="ct">'+(d&&d.error?('error: '+d.error):'no data')+'</span>';return;}
    if(lastSym!==d.symbol){firstFit=true;lastSym=d.symbol;}
    cMain.applyOptions({watermark:{visible:true,text:d.symbol+' · '+d.interval+(d.chart_type==='renko'?' Renko':''),color:"rgba(224,185,116,0.07)",fontSize:40,fontStyle:"bold",horzAlign:"center",vertAlign:"center"}});
    head.innerHTML='<span class="ct">'+d.symbol+' · '+d.interval+'</span><span class="pill">'+(d.chart_type==='renko'?'Renko '+d.brick_mode:'candles')+'</span><span class="pill '+(d.trend==='LONG'?'up':'dn')+'">'+d.trend+'</span><span class="pill">'+d.last_close.toLocaleString()+'</span><span class="pill">'+d.n_qualified+' sig</span>';
    sCandle.setData(d.bricks);const L=on('t_lines');
    sMavi.setData(L?d.mavi:[]);sKir.setData(L?d.kirmizi:[]);sLS.setData(L?d.long_stop:[]);sSS.setData(L?d.short_stop:[]);
    sEwo.setData(d.ewo);sRsi.setData(d.rsi);
    const am=+document.getElementById('adx_slider').value;const qsel=(d.qual_markers||[]).filter(m=>(m.adx||0)>=am);
    let mk=[];if(on('t_qual'))mk=mk.concat(qsel);if(on('t_chand'))mk=mk.concat(d.chand_markers);if(on('t_star'))mk=mk.concat(d.star_markers);if(on('t_dema'))mk=mk.concat(d.robust_markers||[]);
    mk.sort((a,b)=>a.time-b.time);sCandle.setMarkers(mk);
    fibLines.forEach(x=>sCandle.removePriceLine(x));fibLines=[];
    if(on('t_fib'))d.fib.forEach(f=>fibLines.push(sCandle.createPriceLine({price:f.price,color:f.zone?COL.gold:(f.p===0||f.p===1?'#f3e3d0':'#6b5238'),lineWidth:f.zone?2:1,lineStyle:f.zone?0:2,axisLabelVisible:true,title:f.p.toFixed(3)+(f.zone?' ◆':'')})));
    if(rsiBands.length===0&&d.rsi_bands){const b=d.rsi_bands;[[b.top2,'#7a2f2a'],[b.top1,'#ef6b63'],[50,'#4a3520'],[b.bot1,'#36d39a'],[b.bot2,'#1c5a40']].forEach(([p,cc])=>rsiBands.push(sRsi.createPriceLine({price:p,color:cc,lineWidth:1,lineStyle:p===50?2:0,axisLabelVisible:true,title:String(p)})));}
    if(firstFit){firstFit=false;const nn=d.bricks.length;cMain.timeScale().setVisibleLogicalRange({from:Math.max(0,nn-200),to:nn+6});}
    idxByTime={};d.bricks.forEach((b,i)=>idxByTime[b.time]=i);QS=qsel.slice(-6);ensure(QS.length);setBanner(d);pos();notifyIfNew(d,QS,idxByTime);
  }
  function resize(){[[cMain,mainEl],[cEwo,ewoEl],[cRsi,rsiEl]].forEach(([c,e])=>c.resize(e.clientWidth,e.clientHeight));pos();}
  return {render,resize};
}

let COLS=[],LAST=null,SYM='BTC';
function setSym(k){SYM=k;document.querySelectorAll('.symbtn').forEach(b=>b.classList.toggle('active',b.dataset.sym===k));poll();}
function draw(d){if(d['5m'])COLS[0].render(d['5m']);document.getElementById('colR').style.display=d['1h']?'flex':'none';if(d['1h'])COLS[1].render(d['1h']);}
async function fetchK(sym,interval,limit){const u='https://fapi.binance.com/fapi/v1/klines?symbol='+sym+'&interval='+interval+'&limit='+limit;const r=await fetch(u);if(!r.ok)throw new Error('binance '+r.status);return await r.json();}
async function poll(){
  const fs=FAPI[SYM];status('fetching '+SYM+'…');
  try{
    const [k5,k1]=await Promise.all([fetchK(fs,'5m',1500),fetchK(fs,'1h',500)]);
    const d={'5m':RenkoCompute.computePayload(SYM,'5m',k5,true),'1h':RenkoCompute.computePayload(SYM,'1h',k1,false)};
    LAST=d;document.getElementById('sym').textContent=SYM;draw(d);status('on-device · '+new Date().toLocaleTimeString());
  }catch(e){status('error: '+e+' (Binance blocked? try wifi/VPN)');}
}
// --- settings persistence + signal alerts ---
const TOGS=['t_qual','t_bubble','t_chand','t_star','t_dema','t_fib','t_lines','t_alerts'];
function saveSettings(){try{const s={SYM:SYM,adx:document.getElementById('adx_slider').value};TOGS.forEach(id=>s[id]=on(id));localStorage.setItem('renkoSettings',JSON.stringify(s));}catch(e){}}
function loadSettings(){try{const s=JSON.parse(localStorage.getItem('renkoSettings')||'{}');if(s.SYM&&FAPI[s.SYM])SYM=s.SYM;if(s.adx!==undefined){document.getElementById('adx_slider').value=s.adx;document.getElementById('adxval').textContent=s.adx;}TOGS.forEach(id=>{if(typeof s[id]==='boolean')document.getElementById(id).checked=s[id];});}catch(e){}}
let lastAlert={};try{lastAlert=JSON.parse(localStorage.getItem('lastAlert')||'{}');}catch(e){}
function beep(dir){try{const a=new (window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type='sine';o.frequency.value=dir>0?880:430;g.gain.value=0.07;o.start();setTimeout(()=>{o.stop();a.close();},190);}catch(e){}}
function notify(sym,tf,s){const buy=s.dir===1,title=(buy?'▲ BUY ':'▼ SELL ')+sym+' '+tf,body=Number(s.price).toLocaleString()+' · Fib '+s.fib+(s.adx?(' · ADX '+s.adx):'');
  try{if(window.Notification&&Notification.permission==='granted'){if(navigator.serviceWorker&&navigator.serviceWorker.ready){navigator.serviceWorker.ready.then(r=>r.showNotification(title,{body:body,icon:'icon-192.png',badge:'icon-192.png',tag:sym+tf,renotify:true})).catch(function(){new Notification(title,{body:body});});}else{new Notification(title,{body:body});}}}catch(e){}
  beep(s.dir);}
function notifyIfNew(d,QS,idxByTime){if(!on('t_alerts')||!QS.length)return;const latest=QS[QS.length-1],key=d.symbol+'_'+d.interval,seen=lastAlert[key]||0;
  if(latest.time>seen){const idx=idxByTime[latest.time];const fresh=idx!==undefined&&(d.bricks.length-1-idx)<=3;if(seen!==0&&fresh)notify(d.symbol,d.interval,latest);lastAlert[key]=latest.time;try{localStorage.setItem('lastAlert',JSON.stringify(lastAlert));}catch(e){}}}
function init(){
  COLS=[Column('L','headL'),Column('R','headR')];
  loadSettings();
  document.querySelectorAll('.symbtn').forEach(b=>b.classList.toggle('active',b.dataset.sym===SYM));
  document.getElementById('sym').textContent=SYM;
  TOGS.forEach(id=>document.getElementById(id).addEventListener('change',()=>{
    if(id==='t_alerts'&&document.getElementById('t_alerts').checked&&window.Notification&&Notification.permission==='default')Notification.requestPermission();
    saveSettings();if(LAST)draw(LAST);}));
  const advs=document.getElementById('adx_slider');advs.addEventListener('input',()=>{document.getElementById('adxval').textContent=advs.value;saveSettings();if(LAST)draw(LAST);});
  document.querySelectorAll('.symbtn').forEach(b=>b.addEventListener('click',()=>{setSym(b.dataset.sym);saveSettings();}));
  window.addEventListener('resize',()=>COLS.forEach(c=>c.resize()));
  poll();setInterval(poll,20000);
}
function start(){if(window.LightweightCharts&&window.RenkoCompute){init();}else{status('loading libraries…');setTimeout(start,300);}}
window.addEventListener('load',start);
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
</script>
</body>
</html>
